[package]
name = "kaspa-p2p-flows"
description = "Kaspa p2p flows"
rust-version.workspace = true
version.workspace = true
edition.workspace = true
authors.workspace = true
include.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
kaspa-core.workspace = true
kaspa-consensus-core.workspace = true
kaspa-consensus-notify.workspace = true
# EVM Lane §14.2 deposit-claim relay: re-validate a relayed claim's lock via
# script_class::parse_evm_deposit_lock (PQ-only, secp-free — already in kaspad's tree via consensus).
kaspa-txscript.workspace = true
kaspa-p2p-lib.workspace = true
kaspa-p2p-mining.workspace = true
kaspa-utils.workspace = true
kaspa-utils-tower.workspace = true
kaspa-hashes.workspace = true
kaspa-muhash.workspace = true
kaspa-connectionmanager.workspace = true
kaspa-addressmanager.workspace = true
kaspa-consensusmanager.workspace = true
kaspa-mining.workspace = true
kaspa-notify.workspace = true

async-trait.workspace = true
borsh.workspace = true
futures = { workspace = true, features = ["alloc"] }
indexmap.workspace = true
itertools.workspace = true
log.workspace = true
parking_lot.workspace = true
rand.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal"] }
tokio-stream = { workspace = true, features = ["net"] }
uuid = { workspace = true, features = ["v4", "fast-rng"] }
chrono.workspace = true

[features]
# Audit H-1: the RPC EVM ingress (`submit_rpc_evm_transaction`) reads the sender's
# canonical (nonce, balance) view and routes through the STATEFUL admission path
# only under this feature; forwarded from kaspad's `evm` feature (twin of the
# consensus / mining `evm` features). Without it the ingress is the previous
# stateless behavior — the default node build is byte-identical and secp-free.
evm = ["kaspa-mining/evm"]

[lints]
workspace = true
