[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
# MISAKA EVM lane is Shanghai-compatible; pin it so local builds match the chain.
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
# Pin the EXACT compiler so the deployed bytecode is reproducible from this
# snapshot. OpenZeppelin v5.0.2 + forge-std v1.9.4 are pinned in BUILD.md and
# fetched at those exact tags by build.sh; source verification compares against
# the clean-build bytecode hash recorded in BUILD.md.
solc = "0.8.28"
# Deterministic, reproducible artifacts for source verification.
bytecode_hash = "none"
cbor_metadata = false
