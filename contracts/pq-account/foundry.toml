[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
# MISAKA EVM lane is Shanghai-compatible; pin it so local builds match the chain.
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
# executeRoot has 8 params + several locals → the legacy codegen hits "stack too
# deep"; the IR pipeline (with the optimizer) resolves it and is the standard
# choice for account-abstraction-style entrypoints.
via_ir = true
# Pin the EXACT compiler so the deployed bytecode is reproducible from this
# snapshot (forge-std v1.9.4 is fetched at that tag by build.sh). No OpenZeppelin
# dependency — the PQ smart account is self-contained.
solc = "0.8.28"
# Deterministic, reproducible artifacts for source verification.
bytecode_hash = "none"
cbor_metadata = false
