[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
# MISAKA EVM lane is Shanghai-compatible; pin it so local builds match the chain.
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
# JobEscrow.claim reconstructs the receipt transcript + fee split with many
# locals; the IR pipeline resolves "stack too deep" and is the standard choice.
via_ir = true
# Pin the EXACT compiler so the deployed bytecode is reproducible from this
# snapshot (forge-std v1.9.4 is fetched at that tag by build.sh). The MIL v1
# contracts are self-contained (no OpenZeppelin).
solc = "0.8.28"
# Deterministic, reproducible artifacts for source verification.
bytecode_hash = "none"
cbor_metadata = false
