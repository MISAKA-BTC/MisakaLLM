[package]
name = "misaka-mil-provider"
description = "MISAKA Inference Lane (MIL) v0 provider sidecar: PQ data-plane inference server, cumulative Proof-of-Inference receipts, and on-chain registration/receipt anchoring"
publish = false
rust-version.workspace = true
version.workspace = true
edition.workspace = true
authors.workspace = true
include.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "misaka-mil-provider"
path = "src/main.rs"

[lib]
name = "misaka_mil_provider"
path = "src/lib.rs"

[dependencies]
kaspa-addresses.workspace = true
kaspa-consensus-core.workspace = true
kaspa-core.workspace = true
kaspa-hashes.workspace = true
kaspa-rpc-core.workspace = true
kaspa-txscript.workspace = true
kaspa-wrpc-client.workspace = true
kaspa-pq-validator-core.workspace = true
misaka-endpoints.workspace = true
misaka-mil-core.workspace = true
misaka-mil-channel.workspace = true
misaka-mil-attest.workspace = true

async-trait.workspace = true
borsh.workspace = true
faster-hex.workspace = true
libcrux-ml-dsa.workspace = true
log.workspace = true
rand.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
clap = { workspace = true, features = ["env"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time", "signal", "net", "io-util"] }
zeroize.workspace = true

# ADR-0039 PALW — REAL Qwen inference backend (candle GGUF-quantized) behind the frozen
# `VerifiableInferenceBackend` contract. OPTIONAL + OFF by default so the node/consensus build (and the
# `kaspa-consensus` dev-dependency on this crate) never pull the heavy candle/tokenizers stack. Only a
# `--features qwen-backend` build compiles these. See `src/qwen_backend.rs`.
candle-core = { version = "0.9", optional = true }
candle-transformers = { version = "0.9", optional = true }
tokenizers = { version = "0.20", optional = true, default-features = false, features = ["onig"] }
anyhow = { version = "1", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time", "net", "io-util"] }

[features]
# Real local Qwen inference (candle, GGUF-quantized, greedy decode) implementing the same
# `VerifiableInferenceBackend` the mock does — so the k=2 dispatch / leaf / ticket rail is unchanged;
# only the inference is real. CPU by default; add `qwen-metal` (Apple Silicon) or `qwen-cuda` (NVIDIA).
qwen-backend = ["dep:candle-core", "dep:candle-transformers", "dep:tokenizers", "dep:anyhow"]
qwen-metal = ["qwen-backend", "candle-core/metal", "candle-transformers/metal"]
qwen-cuda = ["qwen-backend", "candle-core/cuda", "candle-transformers/cuda"]

# The runnable demo: two real Qwen backends → k=2 exact-match → on-chain leaf → the validator's
# nine-clause `verify_palw_ticket` ACCEPTS. Needs a local GGUF + tokenizer (env vars); see the bin.
[[bin]]
name = "palw-qwen-demo"
path = "src/bin/palw_qwen_demo.rs"
required-features = ["qwen-backend"]

# ADR-0039 Canonical Compute v1 K1 harness — real Qwen single-node determinism + V_i + peak-VRAM on a
# CUDA/RTX host. Reports the measured values a PalwComputeSetRecordV1 commit needs.
[[bin]]
name = "palw-k1-harness"
path = "src/bin/palw_k1_harness.rs"
required-features = ["qwen-backend"]

# ADR-0039 §19 canonical Metal backend — dump a GGUF Qwen to raw fp32 tensors + config manifest so the
# canonical (non-candle) backend can load the real weights.
[[bin]]
name = "palw-qwen-dump"
path = "src/bin/palw_qwen_dump.rs"
required-features = ["qwen-backend"]

[lints]
workspace = true
