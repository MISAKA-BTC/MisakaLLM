[package]
name = "misaka-mil-shield-stark-verify"
description = "MISAKA MIL shielded pool — IN-CONSENSUS STARK verifier (ADR-0034 §4/§5 verify side). The only new code that runs inside block validation when F006 activates the STARK proof system: it implements `misaka_mil_shield::StarkVerifier`, so linking it into the F006 precompile is the entire reference→STARK swap. MUST be deterministic + portable + panic-free (SP-04 — a divergence is a consensus split). Inert until the audited ADR-0033 §SP-0 milestone (returns fail-closed, byte-identical to the reference-only node)."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
misaka-mil-shield.workspace = true
kaspa-hashes.workspace = true
thiserror.workspace = true
borsh.workspace = true

# §SP-0 A1 — the real STARK verify back-half, behind an OFF-by-default feature so the
# default consensus node compiles NONE of these (stays lean, secp-free, inert).
p3-circuit-prover = { workspace = true, optional = true }
p3-circuit = { workspace = true, optional = true }
p3-baby-bear = { workspace = true, optional = true }
p3-field = { workspace = true, optional = true }
p3-fri = { workspace = true, optional = true }
p3-merkle-tree = { workspace = true, optional = true }
p3-symmetric = { workspace = true, optional = true }
p3-commit = { workspace = true, optional = true }
p3-challenger = { workspace = true, optional = true }
p3-dft = { workspace = true, optional = true }
p3-uni-stark = { workspace = true, optional = true }
p3-batch-stark = { workspace = true, optional = true }
postcard = { workspace = true, optional = true }

[dev-dependencies]
# (audit m3) SHA-256 the on-disk A2 patch diff and pin it against the manifest so the two
# cannot silently drift. Test-only — never linked into the inert consensus verifier.
sha2.workspace = true

[features]
# Enables the real `verify_stark` back-half (calls p3 `verify_all_tables`). OFF by
# default; the default node keeps the fail-closed `BackendPending` inert verifier,
# byte-identical to a node that never links the p3 subset. Activation (the fence flip)
# is independent (A7) and gated on the external audit (A6) of these deps.
stark-backend = [
    "dep:p3-circuit-prover", "dep:p3-circuit", "dep:p3-baby-bear", "dep:p3-field", "dep:p3-fri",
    "dep:p3-merkle-tree", "dep:p3-symmetric", "dep:p3-commit", "dep:p3-challenger",
    "dep:p3-dft", "dep:p3-uni-stark", "dep:p3-batch-stark", "dep:postcard",
]
# (A2, AUDIT-GATED) registers the `public_surface` statement-surfacing table with the
# pinned verifier so outer proofs that SURFACE the spend statement verify + bind end to
# end. The registration API only exists in the A2-patched recursion tree
# (docs/bench/plonky3-recursion-a2-surfacing.diff applied on b363397), so this feature
# DOES NOT COMPILE against the workspace-pinned rev without a local `[patch]` override —
# by design: enabling A2 acceptance requires the audit-gated prover-side patch, and the
# committed default (this feature OFF) keeps the node fail-closed (a surfaced proof's
# unknown table is rejected; an unsurfaced proof stays `StatementNotSurfaced`).
stark-backend-a2-surface = ["stark-backend"]
