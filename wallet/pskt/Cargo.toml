[package]
name = "kaspa-wallet-pskt"
keywords = ["kaspa", "wallet", "pskt", "psbt", "bip-370"]
description = "Partially Signed Kaspa Transaction"
categories = ["cryptography::cryptocurrencies"]
rust-version.workspace = true
version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
edition.workspace = true
include.workspace = true

[lib]
crate-type = ["cdylib", "lib"]

[features]
# kaspa-pq PQ-only (ADR-0019 §14): PSKT is an inherently classical
# (ECDSA/Schnorr/BIP32) format — every primitive is keyed on secp256k1
# PublicKey/Signature and there is no ML-DSA PSKT. The whole crate is therefore
# gated behind `legacy-secp256k1`; `pq-only` (default) builds an empty crate that
# links no secp256k1. `wasm32-sdk` re-enables it so the browser SDK keeps PSKT.
default = ["pq-only"]
pq-only = []
legacy-secp256k1 = ["dep:secp256k1", "kaspa-bip32/legacy-secp256k1"]
wasm32-sdk = ["legacy-secp256k1", "kaspa-consensus-client/wasm32-sdk"]
wasm32-types = ["kaspa-consensus-client/wasm32-types"]

# PSKT is classical (secp256k1/Schnorr) only; the example is skipped under the
# pq-only default and built only when the legacy-secp256k1 crate is enabled.
[[example]]
name = "multisig"
required-features = ["legacy-secp256k1"]

[dependencies]
kaspa-addresses.workspace = true
kaspa-bip32.workspace = true
kaspa-consensus-client.workspace = true
kaspa-consensus-core.workspace = true
kaspa-txscript-errors.workspace = true
kaspa-txscript.workspace = true
kaspa-utils.workspace = true

bincode.workspace = true
derive_builder.workspace = true
js-sys.workspace = true
futures.workspace = true
hex.workspace = true
secp256k1 = { workspace = true, optional = true }
serde_repr.workspace = true
serde-value.workspace = true
serde.workspace = true
thiserror.workspace = true
wasm-bindgen.workspace = true
serde_json.workspace = true
serde-wasm-bindgen.workspace = true
workflow-wasm.workspace = true
separator.workspace = true

[dev-dependencies]
serde_json.workspace = true
wasm-bindgen-test.workspace = true
js-sys.workspace = true
web-sys.workspace = true

[lints]
workspace = true
