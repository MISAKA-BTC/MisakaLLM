[package]
name = "kaspa-bip32"
description = "BIP32 for Kaspa"
rust-version.workspace = true
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
# include *.txt files for word lists
include = ["src/**/*.rs", "Cargo.toml", "src/**/*.txt"]
# include.workspace = true

[features]
# kaspa-pq PQ-only (ADR-0019 §14): `pq-only` (default) builds kaspa-bip32 without
# secp256k1 — only the curve-independent BIP39 mnemonic, derivation-path, prefix
# and extended-key-serialization machinery. `legacy-secp256k1` re-enables the
# secp256k1 BIP32 extended-key (xprv/xpub) derivation used by the classical wallet
# and the WASM SDK signer.
default = ["pq-only"]
pq-only = []
legacy-secp256k1 = ["dep:secp256k1"]

[dependencies]
borsh.workspace = true
bs58.workspace = true
getrandom.workspace = true
hmac.workspace = true
js-sys.workspace = true
kaspa-utils.workspace = true
once_cell.workspace = true
pbkdf2.workspace = true
rand_core.workspace = true
rand.workspace = true
ripemd.workspace = true
secp256k1 = { workspace = true, optional = true }
serde.workspace = true
sha2.workspace = true
subtle.workspace = true
thiserror.workspace = true
wasm-bindgen.workspace = true
workflow-wasm.workspace = true
zeroize.workspace = true
kaspa-consensus-core.workspace = true

[dev-dependencies]
faster-hex.workspace = true

[lints]
workspace = true
