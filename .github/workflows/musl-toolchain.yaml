name: Build musl toolchain

on:
  workflow_dispatch:
    inputs:
      # Immutable, versioned release tag (audit H-4). Bump this for every new
      # toolchain build instead of overwriting a single mutable tag. The build
      # refuses to overwrite an existing tag (see "Upload toolchain release").
      release_tag:
        description: 'Immutable release tag to publish (e.g. musl-toolchain-v2)'
        required: true
        default: 'musl-toolchain-v2'
  push:
    paths:
      - 'musl-toolchain/preset.sh'
    branches:
      - master

env:
  # Pin crosstool-ng to an immutable commit SHA instead of a mutable tag
  # (audit H-4). This is the commit the annotated tag crosstool-ng-1.26.0
  # currently points to (peeled "^{}" object of refs/tags/crosstool-ng-1.26.0).
  # TODO: re-verify with `git ls-remote --tags https://github.com/crosstool-ng/crosstool-ng`
  # if the pinned version is changed.
  CTNG_COMMIT: '334f6d6479096b20e80fd39e35f404319bc251b5' # crosstool-ng-1.26.0
  # Default release tag used for push-triggered builds (workflow_dispatch can
  # override via the release_tag input). Bump this to publish a new toolchain.
  DEFAULT_RELEASE_TAG: 'musl-toolchain-v2'

jobs:
  build-toolchain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set preset
        run: source musl-toolchain/preset.sh && echo "CTNG_PRESET=$CTNG_PRESET" >> $GITHUB_ENV

      - name: Calculate preset hash
        run: |
          HASH=$(sha256sum musl-toolchain/preset.sh | awk '{print $1}')
          echo "PRESET_HASH=$HASH" >> $GITHUB_ENV
          echo "Preset hash: $HASH"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool libtool-bin unzip help2man python3-dev gperf bison flex texinfo gawk libncurses5-dev zstd

      - name: Build crosstool-ng
        run: |
          cd musl-toolchain
          git clone https://github.com/crosstool-ng/crosstool-ng
          cd crosstool-ng
          # Pin to an immutable commit SHA, not the mutable tag (audit H-4).
          git checkout "${{ env.CTNG_COMMIT }}"
          # Sanity-check we are on the expected commit.
          echo "crosstool-ng at commit: $(git rev-parse HEAD)"
          ./bootstrap
          ./configure --prefix=$HOME/ctng
          make
          make install

      - name: Build musl toolchain
        run: |
          export PATH=$HOME/ctng/bin:$PATH
          cd musl-toolchain
          ct-ng ${{ env.CTNG_PRESET }}
          ct-ng build > build.log 2>&1
          status=$?
          if [ $status -eq 0 ]; then
            echo "Build succeeded"
            echo "${{ env.PRESET_HASH }}" > "$HOME/x-tools/preset_hash"
            ls -la $HOME/x-tools
          else
            echo "Build failed:"
            cat .config
            cat build.log
            exit 1
          fi

      - name: Package toolchain
        run: |
          tar --use-compress-program=zstd -cf x-tools.tar.zst -C "$HOME" x-tools
          # Publish a SHA-256 sidecar so consumers can verify archive integrity
          # BEFORE extracting (audit H-4). build.sh fetches "<url>.sha256".
          sha256sum x-tools.tar.zst > x-tools.tar.zst.sha256
          ls -lh x-tools.tar.zst x-tools.tar.zst.sha256
          echo "x-tools.tar.zst sha256: $(awk '{print $1}' x-tools.tar.zst.sha256)"

      - name: Upload toolchain release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use an immutable, versioned tag and never overwrite an existing one
          # (audit H-4). Previously this deleted+recreated a mutable
          # "musl-toolchain-v1" tag, which let a release be silently replaced.
          TAG="${{ github.event.inputs.release_tag || env.DEFAULT_RELEASE_TAG }}"
          echo "Publishing immutable release tag: $TAG"

          # Refuse to overwrite an existing release/tag. To publish a new
          # toolchain, bump the release_tag input / DEFAULT_RELEASE_TAG.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "ERROR: release '$TAG' already exists; refusing to overwrite an immutable tag."
            echo "Bump the release_tag input (or DEFAULT_RELEASE_TAG) to a new version and re-run."
            exit 1
          fi

          # Create new release with the toolchain archive AND its sha256 sidecar.
          gh release create "$TAG" x-tools.tar.zst x-tools.tar.zst.sha256 \
            --title "musl cross-compilation toolchain ($TAG)" \
            --notes "Pre-built x86_64-multilib-linux-musl toolchain (crosstool-ng 1.26.0, commit ${{ env.CTNG_COMMIT }}). Preset hash: ${{ env.PRESET_HASH }}. Archive sha256 published as x-tools.tar.zst.sha256." \
            --latest=false
