name: Build and upload assets
on:
  release:
    types: [ published ]

# Least privilege: read by default; the upload jobs below opt into contents: write.
permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # upload release assets (softprops/action-gh-release)
    strategy:
      fail-fast: false
      matrix:
        # Build gnu-linux on ubuntu-18.04 and musl on ubuntu latest
        # os: [ ubuntu-18.04, ubuntu-latest, windows-latest, macos-latest ]
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    name: Building, ${{ matrix.os }}
    steps:
      - name: Fix CRLF on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Checkout sources
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo Build Outputs
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}


      - name: Check musl toolchain tag consistency
        if: runner.os == 'Linux'
        run: bash musl-toolchain/check-tag.sh

      - name: Build on Linux
        if: runner.os == 'Linux'
        # We're using musl to make the binaries statically linked and portable
        env:
          # Fail closed (audit H-5): error out if neither an in-repo pin
          # (EXPECTED_XTOOLS_SHA256) nor a release sidecar is verifiable, instead
          # of warning and proceeding under the legacy preset_hash guard.
          MISAKA_REQUIRE_XTOOLS_SHA256: '1'
        run: |
          # Run build script for musl toolchain
          source musl-toolchain/build.sh
          
          # Go back to the workspace
          cd $GITHUB_WORKSPACE
          
          # Build non-bridge binaries first. Build `misaka` by package+bin so the
          # release cannot silently miss the unified operator CLI if workspace
          # defaults change.
          cargo --verbose build --bin kaspad --bin rothschild --bin kaspa-wallet --release --target x86_64-unknown-linux-musl
          cargo --verbose build -p kaspa-pq-miner -p kaspa-pq-validator -p kaspa-pq-signer --release --target x86_64-unknown-linux-musl
          cargo --verbose build -p misaka-cli --bin misaka --release --target x86_64-unknown-linux-musl
          test -x target/x86_64-unknown-linux-musl/release/misaka
          # Build bridge with allow-multiple-definition to resolve mimalloc/libstdc++ symbol collisions.
          # musl-toolchain/build.sh sets RUSTFLAGS directly, so we append this flag here explicitly.
          export RUSTFLAGS="$RUSTFLAGS -C link-arg=-Wl,--allow-multiple-definition"
          cargo --verbose build --bin stratum-bridge --release --target x86_64-unknown-linux-musl
          mkdir bin || true
          cp target/x86_64-unknown-linux-musl/release/kaspad bin/
          cp target/x86_64-unknown-linux-musl/release/rothschild bin/
          cp target/x86_64-unknown-linux-musl/release/kaspa-wallet bin/
          cp target/x86_64-unknown-linux-musl/release/kaspa-pq-miner bin/
          cp target/x86_64-unknown-linux-musl/release/kaspa-pq-validator bin/
          cp target/x86_64-unknown-linux-musl/release/kaspa-pq-signer bin/
          cp target/x86_64-unknown-linux-musl/release/misaka bin/
          cp target/x86_64-unknown-linux-musl/release/stratum-bridge bin/
          test -x bin/kaspa-pq-miner
          test -x bin/kaspa-pq-validator
          test -x bin/kaspa-pq-signer
          test -x bin/misaka
          archive="bin/rusty-kaspa-${{ github.event.release.tag_name }}-linux-amd64.zip"
          zip -r "${archive}" ./bin/*
          echo "archive=${archive}" >> $GITHUB_ENV

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cargo build --bin kaspad --release
          cargo build --bin rothschild --release
          cargo build --bin kaspa-wallet --release
          cargo build -p kaspa-pq-miner --release
          cargo build -p kaspa-pq-validator --release
          cargo build -p kaspa-pq-signer --release
          cargo build -p misaka-cli --bin misaka --release
          test -f target/release/misaka.exe
          cargo build --bin stratum-bridge --release
          mkdir bin || true
          cp target/release/kaspad.exe bin/
          cp target/release/rothschild.exe bin/
          cp target/release/kaspa-wallet.exe bin/
          cp target/release/kaspa-pq-miner.exe bin/
          cp target/release/kaspa-pq-validator.exe bin/
          cp target/release/kaspa-pq-signer.exe bin/
          cp target/release/misaka.exe bin/
          cp target/release/stratum-bridge.exe bin/
          test -f bin/kaspa-pq-miner.exe
          test -f bin/kaspa-pq-validator.exe
          test -f bin/kaspa-pq-signer.exe
          test -f bin/misaka.exe
          archive="bin/rusty-kaspa-${{ github.event.release.tag_name }}-win64.zip"
          powershell "Compress-Archive bin/* \"${archive}\""
          echo "archive=${archive}" >> $GITHUB_ENV

      - name: Build on MacOS
        if: runner.os == 'macOS'
        run: |
          cargo build --bin kaspad --release
          cargo build --bin rothschild --release
          cargo build --bin kaspa-wallet --release
          cargo build -p kaspa-pq-miner --release
          cargo build -p kaspa-pq-validator --release
          cargo build -p kaspa-pq-signer --release
          cargo build -p misaka-cli --bin misaka --release
          test -x target/release/misaka
          cargo build --bin stratum-bridge --release
          mkdir bin || true
          cp target/release/kaspad bin/
          cp target/release/rothschild bin/
          cp target/release/kaspa-wallet bin/
          cp target/release/kaspa-pq-miner bin/
          cp target/release/kaspa-pq-validator bin/
          cp target/release/kaspa-pq-signer bin/
          cp target/release/misaka bin/
          cp target/release/stratum-bridge bin/
          test -x bin/kaspa-pq-miner
          test -x bin/kaspa-pq-validator
          test -x bin/kaspa-pq-signer
          test -x bin/misaka
          archive="bin/rusty-kaspa-${{ github.event.release.tag_name }}-osx.zip"
          zip -r "${archive}" ./bin/*
          echo "archive=${archive}" >> $GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: ./${{ env.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wasm:
    runs-on: ubuntu-latest
    name: Building WASM32 SDK
    permissions:
      contents: write # upload release assets (softprops/action-gh-release)
    steps:
      - name: Checkout sources
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install llvm
        id: install_llvm
        continue-on-error: true
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo apt-get install -y clang-15 lldb-15 lld-15 clangd-15 clang-tidy-15 clang-format-15 clang-tools-15 llvm-15-dev lld-15 lldb-15 llvm-15-tools libomp-15-dev libc++-15-dev libc++abi-15-dev libclang-common-15-dev libclang-15-dev libclang-cpp15-dev libunwind-15-dev
          # Make Clang 15 default
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/lib/llvm-15/bin/clang++ 100
          sudo update-alternatives --install /usr/bin/clang clang /usr/lib/llvm-15/bin/clang 100
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/lib/llvm-15/bin/clang-format 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/lib/llvm-15/bin/clang-tidy 100
          sudo update-alternatives --install /usr/bin/run-clang-tidy run-clang-tidy /usr/lib/llvm-15/bin/run-clang-tidy 100
          # Alias cc to clang
          sudo update-alternatives --install /usr/bin/cc cc /usr/lib/llvm-15/bin/clang 0
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/lib/llvm-15/bin/clang++ 0

      - name: Install gcc-multilib
        # gcc-multilib allows clang to find gnu libraries properly
        run: |
          sudo apt-get update
          sudo apt install -y gcc-multilib

      - name: Install stable toolchain
        if: steps.install_llvm.outcome == 'success' && steps.install_llvm.conclusion == 'success'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install wasm-pack
        # --locked: build wasm-pack from its committed Cargo.lock for a reproducible toolchain.
        run: cargo install wasm-pack --version 0.15.0 --locked

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install NodeJS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install NodeJS dependencies
        run: npm install --global typedoc@0.28.19 typescript@6.0.3

      - name: Cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM32 SDK
        run: |
          cd wasm
          bash build-release
          cd release
          zip -q -r kaspa-wasm32-sdk-${{ github.event.release.tag_name }}.zip kaspa-wasm32-sdk
          archive="wasm/release/kaspa-wasm32-sdk-${{ github.event.release.tag_name }}.zip"
          echo "archive=${archive}" >> $GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: ./${{ env.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
